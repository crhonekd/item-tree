spring:
  application:
    name: itemtree
  profiles:
    active: dev
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
  task:
    scheduling:
      pool:
        size: 1

server:
  port: 8080
  tomcat:
    threads:
      max: 200

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,itemtree-refresh
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true   # Spring Boot 3.4+ disabled metrics export by default; opt in explicitly
  tracing:
    sampling:
      probability: 1.0  # Phase A: sample everything; TODO Phase B: reduce for production traffic

# ── Placeholder config sections from design §17 ──────────────────────────────
# Filled in by later phases:
#   itemtree.cache.refresh.*       (Phase 9 — done)
#   itemtree.cache.name-search.*   (Phase 7)
#   itemtree.solace.*              (Phases 10/11)
#   itemtree.oracle.sequence-name  (Phase 3)
#   itemtree.data.*                (Phase 5)
itemtree:
  cache:
    refresh:
      delta-cron:             "0 */30 * * * *"
      delta-overlap-seconds:  60
      full-reload-cron:       "0 0 2 * * MON-FRI"
      bootstrap-retries:      3
      bootstrap-backoff:      PT1S,PT5S,PT25S
    name-search: {}
  solace:
    topic: "BC/ICE/ITEMTREE"
    reconnect:
      short-threshold: PT1M
      long-threshold:  PT1H
    health:
      mark-down-after: PT4H
  oracle: {}
  security:
    trusted-cidrs:
      - 127.0.0.1/32
      - "::1/128"
  data:
    types-without-data:
      - Folder
      - Shortcut
      - Shortcut.Report
      - Shortcut.Filter
      - Shortcut.Filter.Nested
    types-also-persisted-as-xml-on-write:
      - DrillDown.Set
      - Report
      - Filter
      - Details.Column.Collection
      - Numeric.Bucket.Collection
      - Discrete.Bucket.Collection
      - Bucket.Collection
    types-sent-as-xml-to-ui: []

springdoc:
  api-docs:
    version: openapi_3_0
